<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Hebi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=replay" />
    <link rel="shortcut icon" href="./res/icon-512.png" />
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#020a15">
</head>
<body>
    <div id="loadingScreen">
        <div id="loadingText">Loading...</div>
        <div id="loader">
            <div id="loadingBar"></div>
            <div id="loadingPercentDiv"><p id="loadingPercent">0%</p></div>
        </div>
        <p id="start">Click to start...</p>
    </div>
    <div class="container">
      <div id="dev"></div>
      <button id="replayBtn" class="hide"><span class="material-symbols-outlined">replay</span></button>
      <button id="wallCollisionToggleBtn" class="hide"><img src="res/pfp.jpg" /></button>
      
      <div id="msg">Wall Collision switched on!</div>
      
      <button id="pauseResumeBtn" class="resume hide"><i class="fa-solid fa-pause"></i></button>
      
    </div>
<script src="js/preloader.js"></script>
<script src="js/vector.js"></script>
<script src="js/math.js"></script>
<script src="js/game.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./Hebi/sw.js')
      .then(reg => console.log('Service Worker registered!'))
      .catch(err => console.log('Registration failed:', err));
    });
  }
                                     
</script>
</body>
</html>
